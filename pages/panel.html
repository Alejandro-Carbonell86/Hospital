<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel - Software Hospital</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <!-- Barra de Navegación Superior -->
  <nav class="navbar">
    <div class="navbar-contenido">
      <div class="navbar-logo">
        <span class="logo-texto">Hospital</span>
      </div>
      <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="panel-contenedor">
    <header class="panel-header">
      <h1>Panel de Usuario</h1>
      <p>Selecciona la acción que necesitas realizar.</p>
    </header>

    <main class="panel-botones" id="panelMenu">
      <button class="boton-panel" id="btnDocumentos">Documentos</button>
      <a class="boton-panel" href="traslados.html">Traslados</a>
    </main>

    <!-- Sección de Documentos -->
    <div id="seccionDocumentos" class="seccion-documentos oculta">
      <div class="doc-header">
        <button class="btn-volver" id="btnVolverDocumentos">Volver</button>
        <h2>Gestión de Documentos</h2>
      </div>

      <div class="doc-contenido">
        <!-- Área de carga -->
        <div class="doc-upload-section">
          <h3>Subir Documento PDF</h3>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="inputPDF" accept=".pdf" style="display: none;" />
            <label for="inputPDF" class="upload-label">
              <span>Haz clic o arrastra un PDF aquí</span>
            </label>
          </div>
          <div id="uploadMessage" class="upload-message"></div>
        </div>

        <!-- Botones de acciones -->
        <div class="doc-acciones">
          <button class="btn-accion btn-subir" id="btnSubir">Subir</button>
          <button class="btn-accion btn-eliminar" id="btnEliminar">Eliminar Seleccionados</button>
        </div>

        <!-- Lista de documentos -->
        <div class="doc-lista-section">
          <h3>Documentos Guardados</h3>
          <div class="doc-lista" id="listaDocumentos">
            <p class="sin-documentos">No hay documentos guardados</p>
          </div>
        </div>

        <!-- Vista previa -->
        <div class="doc-preview-section">
          <h3>Vista Previa y Código QR</h3>
          <div class="doc-preview" id="vistaPrevia">
            <p class="sin-preview">Selecciona un documento para ver la vista previa</p>
          </div>
        </div>

        <!-- Sección de QR para impresión -->
        <div id="seccionQR" class="qr-print-section oculta">
          <div class="qr-print-contenedor">
            <h3 id="qrTitulo">Documento</h3>
            <div id="qrContainer" class="qr-container"></div>
            <p class="qr-info">
              <strong>Token:</strong> <span id="qrToken">-</span>
            </p>
            <input type="text" id="nombreDocumentoEdit" class="input-nombre-doc" placeholder="Nombre del documento" />
            <button id="btnGuardarNombre" class="btn-guardar-nombre">Guardar Nombre</button>
            <button id="btnImprimirQR" class="btn-imprimir-qr">Imprimir QR</button>
          </div>
        </div>

        <!-- Modal de Vista Previa -->
        <div id="modalPreview" class="modal oculta">
          <div class="modal-contenedor">
            <button class="modal-cerrar" id="btnCerrarModal">&times;</button>
            <div class="modal-contenido">
              <div class="modal-pdf">
                <iframe id="modalPDFViewer" src="" type="application/pdf" class="modal-pdf-viewer"></iframe>
              </div>
              <div class="modal-qr">
                <h3 id="modalQRTitulo">Documento</h3>
                <div id="modalQRContainer" class="modal-qr-container"></div>
                <p class="modal-qr-info">
                  <strong>Token:</strong> <br>
                  <span id="modalQRToken">-</span>
                </p>
                <button id="btnImprimirModalQR" class="btn-imprimir-modal-qr">Imprimir QR</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/documentos.js"></script>
</body>
</html>
