<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel - Software Hospital</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <!-- Barra de Navegación Superior -->
  <nav class="navbar">
    <div class="navbar-contenido">
      <div class="navbar-logo">
        <span class="logo-texto">Hospital</span>
      </div>
      <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="panel-contenedor">
    <header class="panel-header">
      <h1>Panel de Usuario</h1>
      <p>Selecciona la acción que necesitas realizar.</p>
    </header>

    <main class="panel-botones" id="panelMenu">
      <button class="boton-panel" id="btnDocumentos">Documentos</button>
      <a class="boton-panel" href="#">Traslados</a>
    </main>

    <!-- Sección de Documentos -->
    <div id="seccionDocumentos" class="seccion-documentos oculta">
      <div class="doc-header">
        <button class="btn-volver" id="btnVolverDocumentos">Volver</button>
        <h2>Gestión de Documentos</h2>
      </div>

      <div class="doc-contenido">
        <!-- Área de carga -->
        <div class="doc-upload-section">
          <h3>Subir Documento PDF</h3>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="inputPDF" accept=".pdf" style="display: none;" />
            <label for="inputPDF" class="upload-label">
              <span>Haz clic o arrastra un PDF aquí</span>
            </label>
          </div>
          <div id="uploadMessage" class="upload-message"></div>
        </div>

        <!-- Botones de acciones -->
        <div class="doc-acciones">
          <button class="btn-accion btn-subir" id="btnSubir">Subir</button>
          <button class="btn-accion btn-eliminar" id="btnEliminar">Eliminar Seleccionados</button>
        </div>

        <!-- Lista de documentos -->
        <div class="doc-lista-section">
          <h3>Documentos Guardados</h3>
          <div class="doc-lista" id="listaDocumentos">
            <p class="sin-documentos">No hay documentos guardados</p>
          </div>
        </div>

        <!-- Vista previa -->
        <div class="doc-preview-section">
          <h3>Vista Previa</h3>
          <div class="doc-preview" id="vistaPrevia">
            <p class="sin-preview">Selecciona un documento para ver la vista previa</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/documentos.js"></script>
</body>
</html>
