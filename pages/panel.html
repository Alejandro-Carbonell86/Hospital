<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel - Software Hospital</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <!-- Barra de Navegación Superior -->
  <nav class="navbar">
    <div class="navbar-contenido">
      <div class="navbar-logo">
        <span class="logo-texto">Hospital</span>
      </div>
      <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="panel-contenedor">
    <header class="panel-header">
      <h1>Panel de Usuario</h1>
      <p>Selecciona la acción que necesitas realizar.</p>
    </header>

    <main class="panel-botones" id="panelMenu">
      <a class="boton-panel" href="documentos.html">Documentos</a>
      <a class="boton-panel" href="traslados.html">Traslados</a>
    </main>

    <!-- Enlaces a secciones: Documentos y Traslados están en páginas separadas -->
  </div>

  <script src="../js/app.js"></script>
  <script>
    // Inicializar comportamiento del botón Cerrar Sesión en el panel
    const btnLogout = document.getElementById('btnLogout');
    if (btnLogout) {
      btnLogout.addEventListener('click', () => {
        if (confirm('¿Cerrar sesión y volver al inicio?')) {
          window.location.href = '../index.html';
        }
      });
    }
  </script>
</body>
</html>
