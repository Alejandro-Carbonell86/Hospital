<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso - Software Hospital</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Bienvenido al Hospital</h1>
      <p>Accede con tu usuario y contraseña para continuar.</p>
    </header>

    <main class="content">
      <div id="message" class="message"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="username">Usuario</label>
          <div class="input-group">
            <input type="text" id="username" name="username" placeholder="Ej: juan.perez" autocomplete="username" />
            <span>👤</span>
          </div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-group">
            <input type="password" id="password" name="password" placeholder="Introduce tu contraseña" autocomplete="current-password" />
            <span>🔒</span>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="button button-primary">Ingresar</button>
          <button type="button" class="button button-secondary" id="resetButton">Limpiar</button>
        </div>

        <p class="note">
          Si eres estudiante o nuevo usuario, ingresa tus datos de usuario para practicar. En un sistema real, estos datos se compararían con el servidor.
        </p>
      </form>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
